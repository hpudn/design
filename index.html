<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPU DESIGN</title>
    
    <!-- 🎨 TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 🪄 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 📸 html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- Font Space Grotesk cho phong cách kỹ thuật & Inter cho văn bản -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style>
        body { 
            background-color: #f0f9ff; /* Xanh nhạt tinh khôi */
            color: #083344;
        }
        .font-space { font-family: 'Space Grotesk', sans-serif; }
        .font-inter { font-family: 'Inter', sans-serif; }

        /* Nền Lưới Cyan mô phỏng chính xác bức ảnh anh Hoàng gửi */
        .cyan-grid-bg {
            background: linear-gradient(180deg, #00d4ff 0%, #7bf0ff 45%, #ffffff 100%);
        }
        .grid-pattern {
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.65) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.65) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Phong cách Neo-Brutalism - Hộp phẳng, viền nét căng, bóng đổ cứng */
        .brutal-box {
            background-color: #ffffff;
            border: 2px solid #083344;
            box-shadow: 6px 6px 0px #06b6d4; /* Bóng màu Cyan đậm */
        }
        .brutal-panel {
            background-color: #ffffff;
            border: 3px solid #083344;
            box-shadow: 10px 10px 0px #bae6fd;
        }
        .brutal-input {
            width: 100%;
            padding: 0.85rem;
            background-color: #f8fafc;
            border: 2px solid #083344;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .brutal-input:focus {
            background-color: #ffffff;
            box-shadow: 4px 4px 0px #06b6d4;
            transform: translate(-2px, -2px);
        }
        .brutal-btn {
            background-color: #0891b2;
            color: white;
            border: 3px solid #083344;
            box-shadow: 6px 6px 0px #083344;
            transition: all 0.1s;
        }
        .brutal-btn:active {
            transform: translate(6px, 6px);
            box-shadow: 0px 0px 0px #083344;
        }

        /* Tùy chỉnh thanh cuộn */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #e0f2fe; border-left: 2px solid #083344; }
        ::-webkit-scrollbar-thumb { background: #0891b2; border: 2px solid #083344; }
        
        .whitespace-pre-line { white-space: pre-line; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center justify-start relative font-inter overflow-x-hidden">

    <!-- Header trang web -->
    <div class="w-full max-w-6xl mb-8 flex items-center justify-between">
        <h1 class="font-space text-3xl font-bold text-cyan-900 drop-shadow-sm flex items-center gap-3">
            <i data-lucide="pen-tool" class="w-8 h-8 text-cyan-500"></i> HPU STUDIO
        </h1>
        <div class="px-4 py-2 bg-cyan-100 border-2 border-cyan-900 font-space font-bold text-sm shadow-[4px_4px_0px_#083344]">
            HPU DESIGN
        </div>
    </div>

    <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-12 gap-10 items-start">
        
        <!-- 🎛️ BẢNG ĐIỀU KHIỂN -->
        <div class="lg:col-span-5 brutal-panel p-6 rounded-xl">
            
            <div class="space-y-6">
                <!-- Nhãn Tin Tức (Tag) -->
                <div>
                    <label class="block font-space font-bold text-cyan-900 mb-2 uppercase tracking-wide text-sm flex items-center gap-2">
                        <i data-lucide="tag" class="w-4 h-4"></i> 1. Nhãn Phân Loại
                    </label>
                    <input type="text" id="tagInput" value="TIN NỔI BẬT" class="brutal-input font-bold text-cyan-900" />
                </div>

                <!-- Tiêu đề chính (Headline) -->
                <div>
                    <label class="block font-space font-bold text-cyan-900 mb-2 uppercase tracking-wide text-sm flex items-center gap-2">
                        <i data-lucide="type" class="w-4 h-4"></i> 2. Tiêu Đề Tin Tức
                    </label>
                    <textarea id="headlineInput" class="brutal-input font-bold" rows="4">Có sự khác biệt nào giữa
chương trình học tiêu chuẩn
quốc tế và chương trình 
thông thường không?</textarea>
                </div>

                <!-- Ảnh Minh Họa Ở Giữa -->
                <div>
                    <label class="block font-space font-bold text-cyan-900 mb-2 uppercase tracking-wide text-sm flex items-center gap-2">
                        <i data-lucide="image" class="w-4 h-4"></i> 3. Ảnh Minh Họa (Tùy chọn)
                    </label>
                    <label class="flex items-center justify-center w-full h-14 border-2 border-dashed border-[#083344] bg-[#f8fafc] hover:bg-white cursor-pointer transition-all shadow-[4px_4px_0px_#06b6d4]">
                        <div class="flex items-center gap-2 text-cyan-800">
                            <i data-lucide="upload-cloud" class="w-5 h-5"></i>
                            <span class="text-sm font-bold font-space">Click để tải ảnh lên</span>
                        </div>
                        <input type="file" id="middleImageUpload" class="hidden" accept="image/*" />
                    </label>
                </div>

                <!-- Tóm tắt (Subline) -->
                <div>
                    <label class="block font-space font-bold text-cyan-900 mb-2 uppercase tracking-wide text-sm flex items-center gap-2">
                        <i data-lucide="align-left" class="w-4 h-4"></i> 4. Đoạn Tóm Tắt
                    </label>
                    <textarea id="sublineInput" class="brutal-input text-slate-700" rows="3">Tìm hiểu chi tiết về lộ trình đào tạo, phương pháp giảng dạy và những cơ hội phát triển toàn diện dành riêng cho sinh viên.</textarea>
                </div>

                <!-- Nút Xuất Ảnh -->
                <button id="downloadBtn" class="w-full mt-4 py-4 brutal-btn rounded-xl font-space font-bold text-lg flex items-center justify-center gap-2 uppercase tracking-wide">
                    <i data-lucide="download" class="w-6 h-6"></i>
                    Bấm Để Xuất Bản
                </button>
            </div>
        </div>

        <!-- 🖼️ SÂN KHẤU HIỂN THỊ (Preview Card) -->
        <div class="lg:col-span-7 flex justify-center overflow-x-auto pb-8">
            
            <!-- Khung thiết kế (Tỷ lệ 4:5 - 500x625) -->
            <div id="design-node" class="relative w-[500px] h-[625px] flex-shrink-0 border-4 border-[#083344] bg-white overflow-hidden shadow-[12px_12px_0px_#bae6fd]">
                
                <!-- 1. NỀN LƯỚI CYAN ĐIỀN ĐẦY KHUNG HÌNH -->
                <div class="absolute inset-0 z-0 cyan-grid-bg"></div>
                <div class="absolute inset-0 z-0 grid-pattern opacity-80"></div>

                <!-- 2. NỘI DUNG NỔI LÊN TRÊN (Các khối hộp trắng) -->
                <div class="relative z-10 w-full h-full flex flex-col px-8 py-6 justify-start">

                    <!-- Hộp nội dung chính "ôm" trọn cả Logo và Tag -->
                    <div class="brutal-box px-8 pt-6 pb-6 bg-white/95 backdrop-blur-sm flex flex-col relative">
                        
                        <!-- Dấu ngoặc kép trang trí lùi xuống một chút -->
                        <div class="absolute top-[80px] right-6 text-5xl font-space text-cyan-200 opacity-40 select-none z-0">"</div>

                        <!-- Phần Header: Logo HPU & Tag -->
                        <div class="flex justify-between items-start mb-5 relative z-20">
                            <!-- Logo HPU -->
                            <img src="https://raw.githubusercontent.com/hpudn/hpudn.github.io/refs/heads/main/share_fb_home-removebg-preview.png" alt="Logo HPU" class="h-[60px] drop-shadow-md" crossorigin="anonymous" />
                            
                            <!-- Nhãn Tag góc phải -->
                            <div class="bg-white border-2 border-[#083344] px-4 py-1.5 shadow-[4px_4px_0px_#06b6d4] transform rotate-2">
                                <span id="previewTag" class="font-space font-bold text-[#083344] text-[13px] tracking-widest uppercase">TIN NỔI BẬT</span>
                            </div>
                        </div>
                        
                        <!-- Tiêu đề (Headline) -->
                        <h1 id="previewHeadline" class="relative z-10 font-space font-bold text-[#083344] tracking-tight whitespace-pre-line mb-4 transition-all duration-300">Có sự khác biệt nào giữa
chương trình học tiêu chuẩn
quốc tế và chương trình 
thông thường không?</h1>
                        
                        <!-- Ảnh minh họa ở giữa -->
                        <div id="previewMiddleImageContainer" class="hidden relative z-10 w-full mb-4 border-[3px] border-[#083344] shadow-[6px_6px_0px_#06b6d4] bg-white overflow-hidden flex items-center justify-center">
                            <img id="previewMiddleImage" src="" alt="Ảnh minh họa" class="w-full h-auto max-h-[190px] object-contain" crossorigin="anonymous" />
                        </div>

                        <!-- Đoạn tóm tắt (Subline) -->
                        <p id="previewSubline" class="relative z-10 font-inter text-[#0e7490] whitespace-pre-line font-medium border-l-4 border-cyan-400 pl-4 transition-all duration-300">Tìm hiểu chi tiết về lộ trình đào tạo, phương pháp giảng dạy và những cơ hội phát triển toàn diện dành riêng cho sinh viên.</p>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- 🧵 JAVASCRIPT GẮN KẾT LOGIC -->
    <script>
        // Gọi icon hiện ra nè
        lucide.createIcons();

        // Mối lương duyên giữa ô nhập và bảng hiển thị cho các thành phần tĩnh
        const mappings = {
            'tagInput': 'previewTag'
        };

        // Lắng nghe phím gõ cho các trường cơ bản
        Object.keys(mappings).forEach(inputId => {
            const inputEl = document.getElementById(inputId);
            const previewEl = document.getElementById(mappings[inputId]);
            
            inputEl.addEventListener('input', (e) => {
                previewEl.innerText = e.target.value;
            });
        });

        // 🪄 PHÉP THUẬT AUTO-RESIZE CỦA HÂN CHO HEADLINE
        const headlineInput = document.getElementById('headlineInput');
        const previewHeadline = document.getElementById('previewHeadline');

        headlineInput.addEventListener('input', (e) => {
            const text = e.target.value;
            const length = text.length;
            
            previewHeadline.innerText = text;

            // Kiểm tra độ dài: thu nhỏ font chữ + bóp chặt line-height để không đẩy xuống dưới
            if (length > 150) {
                previewHeadline.style.fontSize = '18px';
                previewHeadline.style.lineHeight = '1.2';
            } else if (length > 90) {
                previewHeadline.style.fontSize = '22px';
                previewHeadline.style.lineHeight = '1.25';
            } else if (length > 50) {
                previewHeadline.style.fontSize = '26px';
                previewHeadline.style.lineHeight = '1.3';
            } else {
                previewHeadline.style.fontSize = '30px';
                previewHeadline.style.lineHeight = '1.3';
            }
        });
        
        // 🪄 PHÉP THUẬT AUTO-RESIZE CHO ĐOẠN TÓM TẮT (SUBLINE)
        const sublineInput = document.getElementById('sublineInput');
        const previewSubline = document.getElementById('previewSubline');

        sublineInput.addEventListener('input', (e) => {
            const text = e.target.value;
            const length = text.length;
            
            previewSubline.innerText = text;

            // Cơ chế tự động nhỏ lại dành cho đoạn tóm tắt
            if (length > 250) {
                previewSubline.style.fontSize = '12px';
                previewSubline.style.lineHeight = '1.4';
            } else if (length > 150) {
                previewSubline.style.fontSize = '13.5px';
                previewSubline.style.lineHeight = '1.5';
            } else {
                previewSubline.style.fontSize = '15px';
                previewSubline.style.lineHeight = '1.625';
            }
        });

        // Gọi lệnh một lần lúc mới mở web để set size chuẩn ban đầu
        headlineInput.dispatchEvent(new Event('input'));
        sublineInput.dispatchEvent(new Event('input'));

        // 📸 Chức năng hiển thị ảnh minh họa ở giữa
        const middleImageUpload = document.getElementById('middleImageUpload');
        const previewMiddleImage = document.getElementById('previewMiddleImage');
        const previewMiddleImageContainer = document.getElementById('previewMiddleImageContainer');

        middleImageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    previewMiddleImage.src = event.target.result;
                    previewMiddleImageContainer.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        // Chức năng chụp màn hình siêu nét
        const downloadBtn = document.getElementById('downloadBtn');
        const designNode = document.getElementById('design-node');

        downloadBtn.addEventListener('click', async () => {
            try {
                // Đổi chữ nút cho sinh động
                const originalText = downloadBtn.innerHTML;
                downloadBtn.innerHTML = '<span class="animate-pulse flex items-center gap-2"><i data-lucide="loader" class="w-6 h-6 animate-spin"></i> Đang in bản vẽ...</span>';
                lucide.createIcons();

                // Dùng html2canvas chụp lại vùng design-node
                const canvas = await html2canvas(designNode, {
                    scale: 3, // Phóng to gấp 3 lần để ảnh xuất ra nét căng từng pixel
                    backgroundColor: '#ffffff',
                    useCORS: true,
                    logging: false
                });
                
                // Trình kích hoạt tải file tự động
                const link = document.createElement('a');
                link.download = 'han-studio-ban-ve-cyan.png';
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();

                // Xong việc thì trả nút lại như cũ
                downloadBtn.innerHTML = originalText;
                lucide.createIcons(); 

            } catch (error) {
                console.error('Lỗi khi xuất ảnh:', error);
                alert('Ôi, máy in bản vẽ bị kẹt giấy một chút! Anh Hoàng thử bấm lại nha!');
                downloadBtn.innerHTML = originalText;
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
